AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Shichida Backend — ECS Fargate + DynamoDB + ALB + EFS.
  Deploy twice with different Environment values to get fully isolated
  dev and production stacks:
    aws cloudformation deploy --stack-name shichida-backend-infra-dev  --parameter-overrides Environment=dev        ...
    aws cloudformation deploy --stack-name shichida-backend-infra-prod --parameter-overrides Environment=production ...

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, production]
    Description: "Deployment environment. All resource names are suffixed with this value."
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC to deploy into
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: At least 2 public subnets across different AZs (used by ALB and dev ECS tasks)
  PrivateSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: At least 2 private subnets for production ECS tasks (behind NAT gateway)

Resources:

  # ── Security Groups ──────────────────────────────────────────────────

  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "shichida-${Environment} ALB — allow HTTP/HTTPS from internet"
      VpcId: !Ref VpcId
      Tags:
        - Key: Environment
          Value: !Ref Environment
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0

  ECSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "shichida-${Environment} ECS tasks — allow from ALB"
      VpcId: !Ref VpcId
      Tags:
        - Key: Environment
          Value: !Ref Environment
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 8000
          SourceSecurityGroupId: !Ref ALBSecurityGroup

  EFSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "shichida-${Environment} EFS — allow NFS from ECS"
      VpcId: !Ref VpcId
      Tags:
        - Key: Environment
          Value: !Ref Environment
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          SourceSecurityGroupId: !Ref ECSSecurityGroup

  # ── EFS (SQLite persistence — isolated per environment) ───────────────

  EFSFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      PerformanceMode: generalPurpose
      ThroughputMode: bursting
      Encrypted: true
      LifecyclePolicies:
        - TransitionToIA: AFTER_30_DAYS
      FileSystemTags:
        - Key: Name
          Value: !Sub "shichida-sqlite-efs-${Environment}"
        - Key: Environment
          Value: !Ref Environment

  EFSMountTarget:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Select [0, !Ref SubnetIds]
      SecurityGroups:
        - !Ref EFSSecurityGroup

  EFSAccessPoint:
    Type: AWS::EFS::AccessPoint
    Properties:
      FileSystemId: !Ref EFSFileSystem
      PosixUser:
        Uid: "1000"
        Gid: "1000"
      RootDirectory:
        Path: !Sub "/shichida-data-${Environment}"
        CreationInfo:
          OwnerUid: "1000"
          OwnerGid: "1000"
          Permissions: "755"
      AccessPointTags:
        - Key: Environment
          Value: !Ref Environment

  # ── DynamoDB Tables (all suffixed by environment) ─────────────────────
  # dev  tables: ShichidaInvoices-dev, ShichidaCenters-dev, etc.
  # prod tables: ShichidaInvoices-prod, ShichidaCenters-prod, etc.
  # The two stacks never share a table — zero risk of data bleed.

  ShichidaInvoicesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "ShichidaInvoices-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: invoiceId
          AttributeType: S
        - AttributeName: centreCode
          AttributeType: S
      KeySchema:
        - AttributeName: invoiceId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: centreCode-index
          KeySchema:
            - AttributeName: centreCode
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment

  ShichidaCentersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "ShichidaCenters-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: centreId
          AttributeType: S
      KeySchema:
        - AttributeName: centreId
          KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment

  ShichidaChildrenTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "ShichidaChildren-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: childId
          AttributeType: S
        - AttributeName: centreId
          AttributeType: S
      KeySchema:
        - AttributeName: childId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: centreId-index
          KeySchema:
            - AttributeName: centreId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment

  ShichidaUsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "ShichidaUsers-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment

  ShichidaCentresTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "ShichidaCentresTable-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment

  ShichidaRolesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "ShichidaRoles-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: roleId
          AttributeType: S
      KeySchema:
        - AttributeName: roleId
          KeyType: HASH
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # ── ECR Repository (shared — one repo, images tagged by env) ─────────

  ECRRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: shichida-backend
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep last 20 images to support rollback",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 20
                },
                "action": { "type": "expire" }
              }
            ]
          }

  # ── ECS Cluster ──────────────────────────────────────────────────────

  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub "shichida-cluster-${Environment}"
      ClusterSettings:
        - Name: containerInsights
          Value: enabled
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # ── CloudWatch Log Group ─────────────────────────────────────────────

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/shichida-backend-${Environment}"
      RetentionInDays: !If [IsProduction, 90, 30]

  # ── ALB ──────────────────────────────────────────────────────────────

  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "shichida-alb-${Environment}"
      Scheme: internet-facing
      Type: application
      SecurityGroups:
        - !Ref ALBSecurityGroup
      Subnets: !Ref SubnetIds
      Tags:
        - Key: Environment
          Value: !Ref Environment

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "shichida-tg-${Environment}"
      Port: 8000
      Protocol: HTTP
      VpcId: !Ref VpcId
      TargetType: ip
      HealthCheckPath: /api/auth/me/
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: "200-401"
      Tags:
        - Key: Environment
          Value: !Ref Environment

  Listener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  # ── IAM Roles (suffixed per environment) ─────────────────────────────

  ECSExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "shichida-ecs-execution-role-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: secrets-access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                # Each environment reads from its own secret path: shichida/dev/* or shichida/production/*
                Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:shichida/${Environment}/*"

  ECSTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "shichida-ecs-task-role-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: app-permissions
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: S3Access
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                # Each environment uses its own S3 prefix
                Resource: !Sub "arn:aws:s3:::shichida-uploads-${AWS::AccountId}/${Environment}/*"
              - Sid: SESAccess
                Effect: Allow
                Action:
                  - ses:SendEmail
                  - ses:SendRawEmail
                Resource: "*"
              - Sid: DynamoDBAccess
                Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:BatchWriteItem
                  - dynamodb:BatchGetItem
                # Scoped to only THIS environment's tables
                Resource:
                  - !GetAtt ShichidaInvoicesTable.Arn
                  - !Sub "${ShichidaInvoicesTable.Arn}/index/*"
                  - !GetAtt ShichidaCentersTable.Arn
                  - !Sub "${ShichidaCentersTable.Arn}/index/*"
                  - !GetAtt ShichidaChildrenTable.Arn
                  - !Sub "${ShichidaChildrenTable.Arn}/index/*"
                  - !GetAtt ShichidaUsersTable.Arn
                  - !Sub "${ShichidaUsersTable.Arn}/index/*"
                  - !GetAtt ShichidaCentresTable.Arn
                  - !Sub "${ShichidaCentresTable.Arn}/index/*"
                  - !GetAtt ShichidaRolesTable.Arn
                  - !Sub "${ShichidaRolesTable.Arn}/index/*"
              - Sid: EFSAccess
                Effect: Allow
                Action:
                  - elasticfilesystem:ClientMount
                  - elasticfilesystem:ClientWrite
                  - elasticfilesystem:ClientRootAccess
                Resource: !GetAtt EFSFileSystem.Arn

  # ── ECS Task Definition ───────────────────────────────────────────────

  ECSTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    DependsOn: EFSMountTarget
    Properties:
      Family: !Sub "shichida-backend-${Environment}"
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      Cpu: "512"
      Memory: "1024"
      ExecutionRoleArn: !GetAtt ECSExecutionRole.Arn
      TaskRoleArn: !GetAtt ECSTaskRole.Arn
      Volumes:
        - Name: shichida-efs-data
          EFSVolumeConfiguration:
            FilesystemId: !Ref EFSFileSystem
            RootDirectory: /
            TransitEncryption: ENABLED
            AuthorizationConfig:
              AccessPointId: !Ref EFSAccessPoint
              IAM: ENABLED
      ContainerDefinitions:
        - Name: shichida-backend
          Image: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/shichida-backend:latest-${Environment}"
          Essential: true
          PortMappings:
            - ContainerPort: 8000
              Protocol: tcp
          Environment:
            - Name: DJANGO_ENV
              Value: !Ref Environment
            - Name: DJANGO_DEBUG
              # Debug on in dev, off in production
              Value: !If [IsProduction, "False", "True"]
            - Name: DJANGO_DB_PATH
              Value: /data/db.sqlite3
            - Name: DYNAMODB_REGION
              Value: !Ref "AWS::Region"
            - Name: AWS_REGION
              Value: !Ref "AWS::Region"
            # All table names carry the environment suffix
            - Name: DYNAMODB_INVOICES_TABLE
              Value: !Sub "ShichidaInvoices-${Environment}"
            - Name: DYNAMODB_CENTERS_TABLE
              Value: !Sub "ShichidaCenters-${Environment}"
            - Name: DYNAMODB_CHILDREN_TABLE
              Value: !Sub "ShichidaChildren-${Environment}"
            - Name: DYNAMODB_USERS_TABLE
              Value: !Sub "ShichidaUsers-${Environment}"
            - Name: DYNAMODB_ROLES_TABLE
              Value: !Sub "ShichidaRoles-${Environment}"
          Secrets:
            # Secrets are namespaced: shichida/dev/... or shichida/production/...
            - Name: DJANGO_SECRET_KEY
              ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:shichida/${Environment}/django-secret-key"
            - Name: ALLOWED_HOSTS
              ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:shichida/${Environment}/allowed-hosts"
            - Name: CORS_ALLOWED_ORIGINS
              ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:shichida/${Environment}/cors-origins"
          MountPoints:
            - ContainerPath: /data
              SourceVolume: shichida-efs-data
              ReadOnly: false
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Sub "/ecs/shichida-backend-${Environment}"
              awslogs-region: !Ref "AWS::Region"
              awslogs-stream-prefix: ecs

  # ── ECS Service ───────────────────────────────────────────────────────

  ECSService:
    Type: AWS::ECS::Service
    DependsOn: Listener
    Properties:
      ServiceName: !Sub "shichida-backend-service-${Environment}"
      Cluster: !Ref ECSCluster
      LaunchType: FARGATE
      DesiredCount: 1
      TaskDefinition: !Ref ECSTaskDefinition
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: !If [IsProduction, DISABLED, ENABLED]
          SecurityGroups:
            - !Ref ECSSecurityGroup
          Subnets: !If [IsProduction, !Ref PrivateSubnetIds, !Ref SubnetIds]
      LoadBalancers:
        - ContainerName: shichida-backend
          ContainerPort: 8000
          TargetGroupArn: !Ref TargetGroup
      DeploymentConfiguration:
        MinimumHealthyPercent: 50
        MaximumPercent: 200
      Tags:
        - Key: Environment
          Value: !Ref Environment

# ── Conditions ─────────────────────────────────────────────────────────

Conditions:
  IsProduction: !Equals [!Ref Environment, production]

# ── Outputs ────────────────────────────────────────────────────────────

Outputs:
  Environment:
    Value: !Ref Environment
  ALBUrl:
    Description: API base URL
    Value: !Sub "http://${LoadBalancer.DNSName}"
  ECRRepositoryUri:
    Value: !GetAtt ECRRepository.RepositoryUri
  ClusterName:
    Value: !Ref ECSCluster
  ServiceName:
    Value: !GetAtt ECSService.Name
  EFSFileSystemId:
    Description: EFS filesystem ID (SQLite persistence)
    Value: !Ref EFSFileSystem
  EFSAccessPointId:
    Value: !Ref EFSAccessPoint
  DynamoDBInvoicesTable:
    Value: !Ref ShichidaInvoicesTable
  DynamoDBCentersTable:
    Value: !Ref ShichidaCentersTable
  DynamoDBChildrenTable:
    Value: !Ref ShichidaChildrenTable
  DynamoDBUsersTable:
    Value: !Ref ShichidaUsersTable
  DynamoDBCentresTable:
    Value: !Ref ShichidaCentresTable
  DynamoDBRolesTable:
    Value: !Ref ShichidaRolesTable
