version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: shichida
      POSTGRES_USER: shichida_user
      POSTGRES_PASSWORD: shichida_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shichida_user -d shichida"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build: .
    command: python manage.py migrate --noinput
    environment:
      - DJANGO_ENV=development
      - DJANGO_DEBUG=True
      - DJANGO_SECRET_KEY=dev-secret-key-change-in-production
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=shichida
      - DB_USER=shichida_user
      - DB_PASSWORD=shichida_pass
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      db:
        condition: service_healthy

  web:
    build: .
    command: gunicorn schindia_backend.wsgi:application --bind 0.0.0.0:8000 --reload --access-logfile -
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DJANGO_ENV=development
      - DJANGO_DEBUG=True
      - DJANGO_SECRET_KEY=dev-secret-key-change-in-production
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=shichida
      - DB_USER=shichida_user
      - DB_PASSWORD=shichida_pass
      - DB_HOST=db
      - DB_PORT=5432
      - ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0
      - CORS_ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3000
      - AWS_REGION=ap-south-1
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:
