AWSTemplateFormatVersion: "2010-09-09"
Description: Shichida Admin — S3 + CloudFront frontend hosting

Parameters:
  BucketName:
    Type: String
  AuthBase64:
    Type: String
    Description: Base64-encoded "username:password" for Basic Auth
    Default: ""

Resources:
  BasicAuthFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: shichida-basic-auth
      AutoPublish: true
      FunctionConfig:
        Comment: Restricts access to the Shichida admin portal
        Runtime: cloudfront-js-2.0
      FunctionCode: !Sub |
        var EXPECTED = 'Basic ${AuthBase64}';
        function handler(event) {
          var auth = event.request.headers.authorization;
          if (!auth || auth.value !== EXPECTED) {
            return {
              statusCode: 401,
              statusDescription: 'Unauthorized',
              headers: { 'www-authenticate': { value: 'Basic realm="Shichida Admin"' } }
            };
          }
          return event.request;
        }

  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  OriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: shichida-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  Distribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        HttpVersion: http2and3
        DefaultRootObject: index.html
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt OriginAccessControl.Id
            S3OriginConfig: {}
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          Compress: true
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !GetAtt BasicAuthFunction.FunctionMetadata.FunctionARN
        # Send all 403/404s back to index.html so React Router handles them
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
        PriceClass: PriceClass_200

  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "arn:aws:s3:::${FrontendBucket}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${Distribution}"

Outputs:
  BucketName:
    Value: !Ref FrontendBucket
  DistributionId:
    Value: !Ref Distribution
  CloudFrontUrl:
    Value: !Sub "https://${Distribution.DomainName}"
