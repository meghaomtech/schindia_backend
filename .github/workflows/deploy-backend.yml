name: Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write  # required for OIDC
  contents: read

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS (OIDC — no stored secrets)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'ap-south-1' }}

      - name: Verify assumed role
        run: aws sts get-caller-identity

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Deploy Lambda + React → S3 + CloudFront
        env:
          AWS_REGION: ${{ vars.AWS_REGION || 'ap-south-1' }}
          AWS_S3_BUCKET: ${{ vars.AWS_S3_BUCKET }}
          AWS_CF_DIST_ID: ${{ vars.AWS_CF_DIST_ID }}
          VITE_INVOICES_API_URL: ${{ vars.VITE_INVOICES_API_URL }}
        run: |
          chmod +x backend/deploy.sh
          ./backend/deploy.sh
